<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Talep / Soru Paneli</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: transparent; color: #ddd; user-select: none; }
        input, textarea { user-select: text; }

        .panel { width: 900px; height: 600px; background: #181818; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #2a2a2a; }
        .header { background: #121212; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a2a; }
        .header h1 { margin: 0; font-size: 16px; font-weight: 800; color: #fff; flex-grow: 1; text-align: center; }
        .close-btn { background: #2a2a2a; border: none; color: #fff; width: 30px; height: 30px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .close-btn:hover { background: #d9534f; }
        .content { display: flex; flex-grow: 1; height: calc(100% - 50px); }
        .sidebar { width: 220px; background: #1c1c1c; padding: 20px; border-right: 1px solid #2a2a2a; }
        .sidebar-title { font-size: 12px; color: #777; text-transform: uppercase; font-weight: 800; margin-bottom: 15px; letter-spacing: 1px; }
        .tab-btn { width: 100%; text-align: left; padding: 12px 15px; background: transparent; border: 1px solid transparent; color: #bbb; border-radius: 6px; cursor: pointer; font-family: 'Inter'; font-weight: 600; transition: 0.2s; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .tab-btn:hover { background: #252525; color: #fff; }
        .tab-btn.active { background: rgba(217, 83, 79, 0.1); border: 1px solid rgba(217, 83, 79, 0.3); color: #d9534f; }
        .main-area { flex-grow: 1; padding: 20px; overflow-y: auto; background: #181818; }
        
        .form-group { margin-bottom: 15px; position: relative; }
        .form-group label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        .form-control { width: 100%; padding: 12px; background: #121212; border: 1px solid #333; color: #fff; border-radius: 6px; font-family: 'Inter'; outline: none; transition: 0.2s; box-sizing: border-box; }
        .form-control:focus { border-color: #555; }
        textarea.form-control { height: 120px; resize: none; }
        
        .dropdown { position: relative; width: 100%; }
        .dropdown-header { width: 100%; padding: 12px; background: #121212; border: 1px solid #333; color: #fff; border-radius: 6px; font-family: 'Inter'; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; transition: 0.2s; }
        .dropdown-header:hover { border-color: #555; }
        .dropdown-list { position: absolute; top: 100%; left: 0; right: 0; background: #1a1a1a; border: 1px solid #444; border-radius: 6px; margin-top: 5px; z-index: 100; display: none; max-height: 150px; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .dropdown-list.show { display: block; }
        .dropdown-up .dropdown-list { top: auto; bottom: 100%; margin-top: 0; margin-bottom: 5px; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .dropdown-item { padding: 10px 12px; color: #ccc; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .dropdown-item:hover { background: #2a2a2a; color: #fff; }

        .btn-submit { background: #2a2a2a; color: #777; padding: 10px 25px; border: none; border-radius: 6px; font-weight: bold; cursor: not-allowed; transition: 0.2s; }
        .btn-submit.active { background: #d9534f; color: #fff; cursor: pointer; }
        .btn-submit.active:hover { background: #c9302c; }
        
        .report-item { background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 6px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; cursor: pointer; transition: 0.2s; }
        .report-item:hover { border-color: #555; }
        .report-info { display: flex; flex-direction: column; gap: 5px; font-size: 13px; }
        .report-info span { color: #888; }
        .report-info strong { color: #fff; }
        .status { font-weight: bold; font-size: 12px; }
        .status.Açık { color: #f0ad4e; }
        .status.İşleniyor { color: #5bc0de; }
        .status.Çözüldü { color: #5cb85c; }
        .status.Reddedildi { color: #d9534f; }
        .status.İptal { color: #d9534f; }

        .chat-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #2a2a2a; }
        .back-btn { background: #2a2a2a; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .back-btn:hover { background: #444; }
        .chat-box { background: #121212; border: 1px solid #2a2a2a; border-radius: 6px; padding: 15px; height: 320px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { background: #222; padding: 10px 15px; border-radius: 6px; border-left: 3px solid #555; font-size: 13px; word-wrap: break-word;}
        .message.admin { border-left-color: #d9534f; background: rgba(217, 83, 79, 0.05); }
        .message .sender { font-size: 11px; color: #888; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .message .sender strong { color: #ccc; }
        .message.admin .sender strong { color: #d9534f; }
        
        .admin-controls { display: flex; gap: 10px; margin-top: 15px; }
        .btn-admin { padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: #fff; }
        .btn-resolve { background: #5cb85c; }
        .btn-reject { background: #d9534f; }
        .btn-transfer { background: #f0ad4e; color: #000; }
        
        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>
    <div class="panel">
        <div class="header">
            <h1 id="panel-title">Talep / Soru</h1>
            <button class="close-btn" onclick="mta.triggerEvent('report:close')">✖</button>
        </div>
        <div class="content">
            <div class="sidebar">
                <div class="sidebar-title">Talep / Soru</div>
                <button class="tab-btn active" id="tab-new" onclick="switchView('new-report')">Yeni Talep</button>
                <button class="tab-btn" id="tab-list" onclick="fetchReports('my')">Taleplerim</button>
                
                <button class="tab-btn" id="tab-incoming" style="display:none;" onclick="fetchReports('all')">Gelen Raporlar</button>
            </div>
            
            <div class="main-area">
                <div id="new-report" class="view active">
                    <div class="form-group">
                        <label>Tür</label>
                        <div class="dropdown" id="type-dropdown" data-value="Raporlamalar">
                            <div class="dropdown-header"><span>Raporlamalar</span> ▾</div>
                            <div class="dropdown-list" id="type-list">
                                <div class="dropdown-item" data-value="Raporlamalar">Raporlamalar</div>
                                <div class="dropdown-item" data-value="Sorular">Sorular</div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Kategori</label>
                        <div class="dropdown" id="cat-dropdown" data-value="Destek Talebi">
                            <div class="dropdown-header"><span>Destek Talebi</span> ▾</div>
                            <div class="dropdown-list" id="cat-list"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Öncelik</label>
                        <div class="dropdown" id="pri-dropdown" data-value="Normal">
                            <div class="dropdown-header"><span>Normal</span> ▾</div>
                            <div class="dropdown-list" id="pri-list">
                                <div class="dropdown-item" data-value="Düşük">Düşük</div>
                                <div class="dropdown-item" data-value="Normal">Normal</div>
                                <div class="dropdown-item" data-value="Yüksek">Yüksek</div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Açıklama *</label>
                        <textarea class="form-control" id="r-desc" placeholder="Sorununuzu detaylıca açıklayın..." oninput="checkForm()"></textarea>
                    </div>
                    <button class="btn-submit" id="btn-send" onclick="submitReport()">Gönder</button>
                </div>

                <div id="list-reports" class="view">
                    <div id="reports-container"></div>
                </div>

                <div id="chat-report" class="view">
                    <div class="chat-header">
                        <button class="back-btn" onclick="switchView('list-reports')">← Geri</button>
                        <strong id="chat-title">#0000 - Yükleniyor...</strong>
                        <span id="chat-status" class="status Açık" style="margin-left: auto;">Açık</span>
                    </div>
                    
                    <label>Sohbet</label>
                    <div class="chat-box" id="chat-messages"></div>
                    
                    <div id="unclaimed-admin-area" style="display: none; text-align: center; margin-bottom: 10px;">
                        <button class="btn-submit active" style="background:#5cb85c; padding: 10px 20px;" onclick="claimReport()">Talebi Üstlen</button>
                    </div>
                    <div id="claimed-other-area" style="display: none; text-align: center; margin-bottom: 10px; color: #f0ad4e;">
                        Bu taleple <strong id="other-admin-name">X</strong> yetkilisi ilgileniyor.
                    </div>

                    <div id="chat-input-area">
                        <textarea class="form-control" id="chat-input" placeholder="Bir mesaj yazın..." style="height: 60px; margin-bottom: 10px;"></textarea>
                        
                        <div style="display:flex; justify-content: space-between;">
                            <button class="btn-submit active" onclick="sendMessage()">Mesaj Gönder</button>
                            <button class="btn-submit active" style="background:#d9534f;" id="btn-cancel" onclick="updateStatus('İptal Edildi')">Talebi İptal Et</button>
                        </div>
                        
                        <div class="admin-controls" id="admin-controls" style="display: none; border-top: 1px solid #333; padding-top: 15px; margin-top: 15px;">
                            <button class="btn-admin btn-resolve" onclick="updateStatus('Çözüldü')">✔ Çözüldü İşaretle</button>
                            <button class="btn-admin btn-reject" onclick="updateStatus('Reddedildi')">✖ Reddet</button>
                            
                            <div class="dropdown dropdown-up" id="transfer-dropdown" data-value="" style="width:200px;">
                                <div class="dropdown-header"><span id="transfer-span">Yetkili Seçin</span> ▾</div>
                                <div class="dropdown-list" id="transfer-list"></div>
                            </div>
                            <button class="btn-admin btn-transfer" onclick="transferReport()">Devret</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const categories = {
            "Raporlamalar": ["Destek Talebi", "Kural İhlali", "Hata ve Bug"],
            "Sorular": ["Oyun Mekaniği", "Oluşum-Faction", "Diğer"]
        };

        let currentReportId = null;
        let isAdmin = false;
        let myName = "";
        let currentReportCreator = "";
        let currentReportDesc = "";
        let currentListType = "my"; // Hangi sekmedeyiz? (my / all)

        // [YENİ] Panel açılışında Lua'dan gelen yetki bilgisi
        function setAdminStatus(status) {
            isAdmin = status;
            if (isAdmin) {
                document.getElementById('tab-incoming').style.display = "block";
            } else {
                document.getElementById('tab-incoming').style.display = "none";
            }
        }

        document.onclick = function(e) {
            const header = e.target.closest('.dropdown-header');
            if (header) {
                const dropdown = header.closest('.dropdown');
                const list = dropdown.querySelector('.dropdown-list');
                
                document.querySelectorAll('.dropdown-list').forEach(l => {
                    if (l !== list) l.classList.remove('show');
                });
                
                list.classList.toggle('show');
                e.stopPropagation();
                return;
            }

            const item = e.target.closest('.dropdown-item');
            if (item) {
                const dropdown = item.closest('.dropdown');
                const span = dropdown.querySelector('.dropdown-header span');
                const val = item.getAttribute('data-value');
                
                span.innerText = val;
                dropdown.setAttribute('data-value', val);
                dropdown.querySelector('.dropdown-list').classList.remove('show');
                
                if (dropdown.id === 'type-dropdown') {
                    updateCategories(val);
                }
                return;
            }

            document.querySelectorAll('.dropdown-list').forEach(l => l.classList.remove('show'));
        };

        function updateCategories(type) {
            const catList = document.getElementById('cat-list');
            const catDropdown = document.getElementById('cat-dropdown');
            const catSpan = catDropdown.querySelector('.dropdown-header span');
            
            catList.innerHTML = "";
            categories[type].forEach((cat, index) => {
                let div = document.createElement("div");
                div.className = "dropdown-item";
                div.setAttribute('data-value', cat);
                div.innerText = cat;
                catList.appendChild(div);

                if(index === 0) {
                    catDropdown.setAttribute('data-value', cat);
                    catSpan.innerText = cat;
                }
            });
        }

        function checkForm() {
            const desc = document.getElementById('r-desc').value;
            const btn = document.getElementById('btn-send');
            if (desc.trim().length > 10) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        }

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            if (viewId === 'new-report') {
                document.getElementById('tab-new').classList.add('active');
            } else if (viewId === 'list-reports' || viewId === 'chat-report') {
                if (currentListType === 'all') {
                    document.getElementById('tab-incoming').classList.add('active');
                } else {
                    document.getElementById('tab-list').classList.add('active');
                }
            }
        }

        function submitReport() {
            const btn = document.getElementById('btn-send');
            if (!btn.classList.contains("active")) return;
            
            const data = {
                type: document.getElementById('type-dropdown').getAttribute('data-value'),
                category: document.getElementById('cat-dropdown').getAttribute('data-value'),
                priority: document.getElementById('pri-dropdown').getAttribute('data-value'),
                desc: document.getElementById('r-desc').value
            };
            
            mta.triggerEvent("report:submit", JSON.stringify(data));
            document.getElementById('r-desc').value = "";
            checkForm();
            fetchReports('my'); // Oluşturunca Taleplerime atar
        }

        // [GÜNCELLEME] listType parametresi eklendi
        function fetchReports(type = 'my') {
            currentListType = type;
            switchView('list-reports');
            document.getElementById('reports-container').innerHTML = "<p>Yükleniyor...</p>";
            mta.triggerEvent("report:requestList", type);
        }

        function decodeB64(b64) {
            let binary = window.atob(b64);
            let bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return new TextDecoder('utf-8').decode(bytes);
        }

        // [GÜNCELLEME] listType yakalanır
        function loadReportList(b64Data, adminStatus, playerName, listType) {
            isAdmin = adminStatus;
            myName = playerName;
            currentListType = listType;
            
            document.getElementById('tab-incoming').style.display = isAdmin ? "block" : "none";
            
            let parsedData = [];
            try { parsedData = JSON.parse(decodeB64(b64Data)); } catch(e) {}

            let reports = parsedData;
            if (Array.isArray(parsedData) && Array.isArray(parsedData[0])) {
                reports = parsedData[0];
            }

            const container = document.getElementById('reports-container');
            container.innerHTML = "";
            
            if (!reports || reports.length === 0) {
                container.innerHTML = "<p style='color:#777; text-align:center;'>Gösterilecek talep bulunmuyor.</p>";
                return;
            }

            reports.forEach(r => {
                if (!r || r.id === undefined) return;
                let div = document.createElement('div');
                div.className = "report-item";
                div.onclick = () => openChat(r);
                
                let claimedText = (r.claimed_by && r.claimed_by !== "") ? `<span style="color:#5bc0de;">(${r.claimed_by})</span>` : "";
                
                div.innerHTML = `
                    <div class="report-info">
                        <span>#${r.id} | Yapan: <strong>${r.player_name}</strong></span>
                        <span>Tip: <strong>${r.type}</strong> | Kategori: <strong>${r.category}</strong></span>
                    </div>
                    <div class="report-info" style="text-align:right;">
                        <span class="status ${r.status.split(' ')[0]}">${r.status} ${claimedText}</span>
                        <span>Öncelik: <strong>${r.priority}</strong></span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function openChat(report) {
            currentReportId = report.id;
            currentReportCreator = report.player_name;
            currentReportDesc = report.description;
            
            switchView('chat-report');
            
            let dStatus = report.status;
            if (report.claimed_by && report.claimed_by !== "") dStatus += " (" + report.claimed_by + ")";
            
            document.getElementById('chat-title').innerText = `#${report.id} — ${report.type} → ${report.category}`;
            document.getElementById('chat-status').innerText = dStatus;
            document.getElementById('chat-status').className = "status " + report.status.split(' ')[0];
            
            const isClosed = (report.status === "Çözüldü" || report.status === "Reddedildi" || report.status === "İptal Edildi");
            
            const inputArea = document.getElementById('chat-input-area');
            const adminControls = document.getElementById('admin-controls');
            const btnCancel = document.getElementById('btn-cancel');
            const unclaimedArea = document.getElementById('unclaimed-admin-area');
            const claimedOtherArea = document.getElementById('claimed-other-area');
            
            inputArea.style.display = "block";
            inputArea.style.opacity = "1";
            inputArea.style.pointerEvents = "auto";
            adminControls.style.display = "none";
            btnCancel.style.display = "none";
            unclaimedArea.style.display = "none";
            claimedOtherArea.style.display = "none";

            if (isAdmin) {
                if (!report.claimed_by && !isClosed) {
                    inputArea.style.display = "none";
                    unclaimedArea.style.display = "block";
                } else if (report.claimed_by === myName && !isClosed) {
                    adminControls.style.display = "flex";
                    mta.triggerEvent("report:requestOnlineAdmins"); 
                } else if (report.claimed_by && report.claimed_by !== myName && !isClosed) {
                    inputArea.style.display = "none";
                    document.getElementById('other-admin-name').innerText = report.claimed_by;
                    claimedOtherArea.style.display = "block";
                } else if (isClosed) {
                    inputArea.style.opacity = "0.3";
                    inputArea.style.pointerEvents = "none";
                }
            } else {
                if (report.status === "Açık" || report.status === "İşleniyor") {
                    btnCancel.style.display = "block";
                }
                if (isClosed) {
                    inputArea.style.opacity = "0.3";
                    inputArea.style.pointerEvents = "none";
                }
            }

            document.getElementById('chat-messages').innerHTML = "<p>Mesajlar yükleniyor...</p>";
            mta.triggerEvent("report:requestChat", currentReportId);
        }

        function updateClaimUI(reportId, adminName) {
            if (currentReportId === reportId) {
                document.getElementById('chat-status').innerText = "İşleniyor (" + adminName + ")";
                document.getElementById('chat-status').className = "status İşleniyor";
                
                if (isAdmin) {
                    if (adminName === myName) {
                        document.getElementById('unclaimed-admin-area').style.display = "none";
                        document.getElementById('admin-controls').style.display = "flex";
                        document.getElementById('chat-input-area').style.display = "block";
                        document.getElementById('chat-input-area').style.opacity = "1";
                        document.getElementById('chat-input-area').style.pointerEvents = "auto";
                        mta.triggerEvent("report:requestOnlineAdmins");
                    } else {
                        document.getElementById('unclaimed-admin-area').style.display = "none";
                        document.getElementById('chat-input-area').style.display = "none";
                        document.getElementById('other-admin-name').innerText = adminName;
                        document.getElementById('claimed-other-area').style.display = "block";
                    }
                }
            }
            mta.triggerEvent("report:requestList", currentListType);
        }

        function loadOnlineAdmins(b64Data) {
            let parsedData = [];
            try { parsedData = JSON.parse(decodeB64(b64Data)); } catch(e) {}

            let admins = parsedData;
            if (Array.isArray(parsedData) && Array.isArray(parsedData[0])) {
                admins = parsedData[0];
            }
            
            const tList = document.getElementById('transfer-list');
            const tSpan = document.getElementById('transfer-span');
            const tDrop = document.getElementById('transfer-dropdown');
            
            tList.innerHTML = "";
            tSpan.innerText = "Yetkili Seçin";
            tDrop.setAttribute('data-value', '');

            if(!admins || admins.length === 0) return;

            admins.forEach(adminName => {
                if(adminName === myName) return; 
                let div = document.createElement("div");
                div.className = "dropdown-item";
                div.setAttribute('data-value', adminName);
                div.innerText = adminName;
                tList.appendChild(div);
            });
        }

        function loadChatMessages(b64Data) {
            let parsedData = [];
            try { parsedData = JSON.parse(decodeB64(b64Data)); } catch(e) {}

            let msgs = parsedData;
            if (Array.isArray(parsedData) && Array.isArray(parsedData[0])) {
                msgs = parsedData[0];
            }
            
            const box = document.getElementById('chat-messages');
            box.innerHTML = "";
            
            let descDiv = document.createElement('div');
            descDiv.className = "message";
            descDiv.style.borderLeftColor = "#f0ad4e"; 
            descDiv.innerHTML = `
                <div class="sender"><strong style="color:#f0ad4e;">${currentReportCreator}</strong> <span style="color:#f0ad4e;">[Talep Açıklaması]</span></div>
                <div>${currentReportDesc}</div>
            `;
            box.appendChild(descDiv);
            
            if(!msgs || msgs.length === 0) {
                let waitDiv = document.createElement('div');
                waitDiv.innerHTML = "<div style='color:#777; font-size:12px; padding:10px; text-align:center;'>Henüz bir yanıt yok.</div>";
                box.appendChild(waitDiv);
            } else {
                msgs.forEach(m => {
                    if (!m || m.id === undefined) return;
                    let div = document.createElement('div');
                    div.className = "message " + (m.is_admin === 1 ? "admin" : "");
                    div.innerHTML = `
                        <div class="sender"><strong>${m.sender_name}</strong> <span>${m.time}</span></div>
                        <div>${m.message}</div>
                    `;
                    box.appendChild(div);
                });
            }
            box.scrollTop = box.scrollHeight;
        }

        function syncChatIfActive(reportId, b64Data) {
            if (currentReportId === reportId) {
                loadChatMessages(b64Data);
            }
        }

        function claimReport() {
            mta.triggerEvent("report:claim", currentReportId);
        }

        function sendMessage() {
            const inp = document.getElementById('chat-input');
            const msg = inp.value.trim();
            if(msg.length === 0) return;
            mta.triggerEvent("report:sendMsg", currentReportId, msg);
            inp.value = "";
        }

        function updateStatus(newStatus) {
            mta.triggerEvent("report:updateStatus", currentReportId, newStatus);
        }

        function transferReport() {
            const target = document.getElementById('transfer-dropdown').getAttribute('data-value');
            if(!target || target.length === 0) return alert("Lütfen devredilecek yetkiliyi seçin!");
            mta.triggerEvent("report:transfer", currentReportId, target);
        }

        updateCategories("Raporlamalar");
    </script>
</body>
</html>
