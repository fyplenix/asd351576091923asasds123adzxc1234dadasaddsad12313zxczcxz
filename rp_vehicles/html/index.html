<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gallery-wrapper">
        <div class="gallery-window glass-effect">
            <div class="header">
                <div class="header-title">
                    <svg viewBox="0 0 512 512" width="24" height="24" fill="#E4C000"><path d="M135.2 117.4L109.1 192H402.9l-26.1-74.6C372.3 104.6 360.2 96 346.6 96H165.4c-13.6 0-25.7 8.6-30.2 21.4zM39.6 196.8L74.8 96.3C88.3 57.8 124.6 32 165.4 32H346.6c40.8 0 77.1 25.8 90.6 64.3l35.2 100.5c23.2 9.6 39.6 32.5 39.6 59.2V400v48c0 17.7-14.3 32-32 32H448c-17.7 0-32-14.3-32-32V400H96v48c0 17.7-14.3 32-32 32H32c-17.7 0-32-14.3-32-32V400 256c0-26.7 16.4-49.6 39.6-59.2zM128 288a32 32 0 1 0 -64 0 32 32 0 1 0 64 0zm288 32a32 32 0 1 0 0-64 32 32 0 1 0 0 64z"/></svg>
                    Premium Motors
                </div>
                <button class="close-btn" onclick="closeGallery()">✕</button>
            </div>

            <div class="gallery-content">
                <div class="car-list-section">
                    <h3>Katalog</h3>
                    <div class="car-list" id="car-list">
                        </div>
                </div>

                <div class="car-details-section">
                    <div class="selected-car-info">
                        <h1 id="selected-name">Araç Seçin</h1>
                        <p class="car-class" id="selected-class">Sınıf: -</p>
                        <h2 class="car-price" id="selected-price">$0</h2>
                    </div>

                    <div class="customization-section" id="customization-box" style="display: none;">
                        
                        <h3>Renk Seçimi</h3>
                        <p class="info-text" style="margin-bottom: 5px;">Aracınızın fabrikasyon rengini belirleyin.</p>
                        
                        <div class="color-matrix">
                            <div class="color-swatch swatch-selected" style="background-color: #505050;" onclick="selectPresetColor('#505050', this)"></div>
                            <div class="color-swatch" style="background-color: #000000;" onclick="selectPresetColor('#000000', this)"></div>
                            <div class="color-swatch" style="background-color: #ffffff;" onclick="selectPresetColor('#ffffff', this)"></div>
                            <div class="color-swatch" style="background-color: #0a2e5c;" onclick="selectPresetColor('#0a2e5c', this)"></div>
                            <div class="color-swatch" style="background-color: #a30000;" onclick="selectPresetColor('#a30000', this)"></div>
                            <div class="color-swatch" style="background-color: #0f4d1e;" onclick="selectPresetColor('#0f4d1e', this)"></div>
                        </div>

                        <div class="custom-color-picker">
                            <div class="selected-color-preview" id="custom-color-preview" style="background-color: #505050;"></div>
                            <input type="color" id="car-color" class="color-picker" value="#505050" oninput="updateCustomColor(this.value)">
                        </div>
                        
                        <div class="custom-plate-section" style="margin-top: 5px; margin-bottom: 10px;">
                            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
                                <h3 style="margin: 0;">Özel Plaka</h3>
                                <span class="donate-badge">500 DC</span>
                                <span class="current-dc-badge" id="player-dc-display">Mevcut: Yükleniyor...</span>
                            </div>
                            <p class="info-text">Sadece <span style="color:#ff9f43; font-weight:bold;">Donate Cash</span> ile alınabilir. Boş bırakırsanız rastgele plaka verilir.</p>
                            <input type="text" id="custom-plate" class="modern-input" placeholder="Örn: 34 FURKAN 01" maxlength="15">
                        </div>

                        <button class="buy-btn" onclick="buyVehicle()">
                            Satın Al
                            <svg viewBox="0 0 576 512" width="16" height="16" fill="#000" style="margin-left: 8px;"><path d="M0 24C0 10.7 10.7 0 24 0H69.5c22 0 41.5 12.8 50.6 32h411c26.3 0 45.5 25 38.6 50.4l-41 152.3c-8.5 31.4-37 53.3-69.5 53.3H170.7l5.4 28.5c2.2 11.3 12.1 19.5 23.6 19.5H488c13.3 0 24 10.7 24 24s-10.7 24-24 24H199.7c-34.6 0-64.3-24.6-70.7-58.5L77.4 54.5c-.7-3.8-4-6.5-7.9-6.5H24C10.7 48 0 37.3 0 24zM128 464a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zm336-48a48 48 0 1 1 0 96 48 48 0 1 1 0-96z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
